name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install only flake8 — no need for all dependencies just to lint
      - name: Install flake8
        run: pip install flake8

      # Run flake8 on your store app and project config
      # --max-line-length=120 means lines up to 120 chars are OK
      # --exclude tells it to ignore migrations (auto-generated code)
      - name: Run flake8
        run: |
          flake8 store/ kokanibazaar/ \
            --max-line-length=120 \
            --exclude=store/migrations/,kokanibazaar/__pycache__/ \
            --ignore=E501,W503
