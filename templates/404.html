
{% extends 'base.html' %}

{% block title %}Page Not Found - Kokani Bazaar{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12">
    <div class="text-center px-4">
        <!-- 404 Error Code -->
        <div class="text-[120px] md:text-[180px] font-bold text-gray-200 leading-none mb-4 select-none">
            404
        </div>
        
        <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">
            Page Not Found
        </h1>
        
        <p class="text-gray-600 text-lg mb-10 max-w-md mx-auto">
            The page you are looking for might have been removed, had its name changed, 
            or is temporarily unavailable.
        </p>
        
        <a href="{% url 'home' %}" 
           class="inline-block bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-xl font-medium text-lg transition">
            ← Return to Homepage
        </a>
    </div>
</div>
{% endblock %}
